<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; width: 100vw; height: 100vh; font-family: system-ui, -apple-system, sans-serif; }
  canvas { display: block; width: 100%; height: 100%; }

  #hint {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.45);
    font-size: 13px;
    letter-spacing: 0.04em;
    pointer-events: none;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
    transition: opacity 0.6s;
  }

  #panel {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.94);
    width: 380px;
    background: rgba(12, 12, 18, 0.85);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    padding: 26px 26px 22px;
    color: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s ease, transform 0.22s ease;
    z-index: 100;
  }
  #panel.open { opacity: 1; pointer-events: all; transform: translate(-50%, -50%) scale(1); }

  #panel h2 {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 20px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    margin: 18px 0 12px;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 13px;
  }
  .row label {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    width: 108px;
    flex-shrink: 0;
  }
  .row input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 15px; height: 15px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    box-shadow: 0 1px 5px rgba(0,0,0,0.4);
  }
  .row input[type=range]::-moz-range-thumb {
    width: 15px; height: 15px;
    border-radius: 50%;
    background: #fff;
    border: none;
    cursor: pointer;
  }
  .row .val {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    width: 26px;
    text-align: right;
    flex-shrink: 0;
  }
  .row input[type=color] {
    -webkit-appearance: none;
    width: 34px; height: 22px;
    border: none; border-radius: 4px;
    padding: 0; cursor: pointer; background: none; flex-shrink: 0;
  }
  .row input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
  .row input[type=color]::-webkit-color-swatch { border-radius: 4px; border: 0.5px solid rgba(255,255,255,0.2); }

  .swatch-pair { display: flex; gap: 6px; align-items: flex-end; }
  .swatch-col { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .swatch-col span { font-size: 10px; color: rgba(255,255,255,0.3); }

  .divider { border: none; border-top: 0.5px solid rgba(255,255,255,0.08); margin: 16px 0; }

  #close-btn {
    display: block;
    margin: 6px auto 0;
    background: rgba(255,255,255,0.08);
    border: 0.5px solid rgba(255,255,255,0.14);
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    padding: 8px 28px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.15s;
  }
  #close-btn:hover { background: rgba(255,255,255,0.16); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">Double-click to open settings</div>

<div id="panel">
  <h2>Cloud Settings</h2>

  <p class="section-label">Sky</p>

  <div class="row">
    <label>Sky colours</label>
    <div class="swatch-pair">
      <div class="swatch-col"><span>Top</span><input type="color" id="skyTop" value="#1a4a7a"></div>
      <div class="swatch-col"><span>Bot</span><input type="color" id="skyBottom" value="#8ec8f0"></div>
    </div>
  </div>

  <hr class="divider">

  <p class="section-label">Clouds</p>

  <div class="row">
    <label>Cloud colours</label>
    <div class="swatch-pair">
      <div class="swatch-col"><span>Light</span><input type="color" id="cloudLight" value="#ffffff"></div>
      <div class="swatch-col"><span>Shadow</span><input type="color" id="cloudShadow" value="#c0d4e8"></div>
    </div>
  </div>

  <div class="row">
    <label>Density</label>
    <input type="range" min="0" max="100" value="25" id="density">
    <span class="val" id="densityVal">25</span>
  </div>

  <div class="row">
    <label>Size</label>
    <input type="range" min="0" max="100" value="50" id="cloudSize">
    <span class="val" id="cloudSizeVal">50</span>
  </div>

  <div class="row">
    <label>Width</label>
    <input type="range" min="0" max="100" value="30" id="cloudWidth">
    <span class="val" id="cloudWidthVal">30</span>
  </div>

  <div class="row">
    <label>Height</label>
    <input type="range" min="0" max="100" value="40" id="cloudHeight">
    <span class="val" id="cloudHeightVal">40</span>
  </div>

  <div class="row">
    <label>Speed</label>
    <input type="range" min="0" max="100" value="30" id="speed">
    <span class="val" id="speedVal">30</span>
  </div>

  <div class="row">
    <label>Sharpness</label>
    <input type="range" min="0" max="100" value="60" id="sharpness">
    <span class="val" id="sharpnessVal">60</span>
  </div>

  <hr class="divider">
  <button id="close-btn">Close</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const panel = document.getElementById('panel');
const hint = document.getElementById('hint');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Settings ────────────────────────────────────────────────────
const settings = {
  skyTop: '#1a4a7a',
  skyBottom: '#8ec8f0',
  cloudLight: '#ffffff',
  cloudShadow: '#c0d4e8',
  density: 25,
  cloudSize: 50,   // live multiplier — applied at draw time
  cloudWidth: 30,  // 0=circular, 100=4:1 stretch — applied at draw time
  cloudHeight: 40,
  speed: 30,
  sharpness: 60,
};

// ── Colour helpers ───────────────────────────────────────────────
function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function rgbAlpha(hex, alpha) {
  const [r,g,b] = hexToRgb(hex);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Cloud pool ───────────────────────────────────────────────────
// Target count driven by density: 0→0, 100→120
function targetCount() { return Math.round((settings.density / 100) * 120); }

const clouds = [];

// Cloud height band: returns a normalised 0-1 y value, spread ±0.10 around centre
function cloudBandBaseY() {
  const centre = settings.cloudHeight / 100;
  const spread = 0.10;
  return centre - spread + Math.random() * spread * 2;
}

function makeCloud(x) {
  const baseW = W * (0.10 + Math.random() * 0.22);
  const h = baseW * (0.3 + Math.random() * 0.28);
  const spd = 0.12 + Math.random() * 0.38;
  const count = 5 + Math.floor(Math.random() * 7);
  const blobs = [];
  for (let i = 0; i < count; i++) {
    blobs.push({
      ox: (Math.random() - 0.3) * baseW,
      oy: (Math.random() - 0.55) * h * 0.85,
      r: h * (0.32 + Math.random() * 0.52),
    });
  }
  // baseY is normalised (0-1) position within the band at spawn time.
  // At draw time: cy = baseY * H + heightOffset, so moving the slider
  // shifts all existing clouds immediately without respawning.
  return { x, baseY: cloudBandBaseY(), spawnCentre: settings.cloudHeight / 100, baseW, h, spd, blobs, offset: Math.random() * 6283, fadeAlpha: 1, dying: false };
}

// Seed initial clouds spread across screen
for (let i = 0; i < targetCount(); i++) {
  clouds.push(makeCloud(Math.random() * W * 1.3 - W * 0.15));
}

// ── Reconcile cloud count with target ───────────────────────────
// Runs every frame. Bursts up to N changes per call so density slider
// feels instant rather than drip-feeding one cloud per 130ms.
function reconcileClouds() {
  // Count only living (non-dying) clouds against target
  const living = clouds.filter(c => !c.dying).length;
  const target = targetCount();
  const diff = target - living;
  const burst = Math.min(Math.abs(diff), 5);

  if (diff > 0) {
    for (let i = 0; i < burst; i++) {
      const x = Math.random() * W * 1.3 - W * 0.15;
      clouds.push(makeCloud(x));
    }
  } else if (diff < 0) {
    // Mark excess living clouds as dying — prefer ones furthest right
    const living_clouds = clouds.filter(c => !c.dying);
    living_clouds.sort((a, b) => b.x - a.x);
    for (let i = 0; i < burst && i < living_clouds.length; i++) {
      living_clouds[i].dying = true;
    }
  }
}

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, settings.skyTop);
  grad.addColorStop(1, settings.skyBottom);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// ── Draw clouds ──────────────────────────────────────────────────
function drawClouds(ts) {
  if (clouds.length === 0) return;

  const blur = (100 - settings.sharpness) / 100;
  const blurPx = blur * 32;
  const sizeMult = 0.3 + (settings.cloudSize / 100) * 1.4;
  const widthMult = 1 + (settings.cloudWidth / 100) * 3;

  for (const cloud of clouds) {
    if (cloud.fadeAlpha <= 0) continue;

    const cx = cloud.x;
    // Live height: shift each cloud by how far the slider has moved since it spawned
    const heightDelta = (settings.cloudHeight / 100 - cloud.spawnCentre) * H;
    const liveCy = cloud.baseY * H + heightDelta;

    const bobAlpha = 0.78 + 0.18 * Math.sin(ts * 0.0006 + cloud.offset);
    const alpha = bobAlpha * cloud.fadeAlpha;

    ctx.save();
    if (blurPx > 1) ctx.filter = `blur(${blurPx}px)`;
    ctx.translate(cx, liveCy);
    ctx.scale(sizeMult * widthMult, sizeMult);
    ctx.translate(-cx, -liveCy);

    for (const blob of cloud.blobs) {
      const bx = cx + blob.ox;
      const by = liveCy + blob.oy;
      const br = blob.r;
      const grad = ctx.createRadialGradient(bx, by - br * 0.12, br * 0.04, bx, by, br);
      grad.addColorStop(0,    rgbAlpha(settings.cloudLight, alpha));
      grad.addColorStop(0.65, rgbAlpha(settings.cloudLight, alpha * 0.88));
      grad.addColorStop(1,    rgbAlpha(settings.cloudLight, 0));
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(bx, by, br, 0, Math.PI * 2);
      ctx.fill();
    }

    for (const blob of cloud.blobs) {
      const bx = cx + blob.ox;
      const by = liveCy + blob.oy + blob.r * 0.2;
      const br = blob.r;
      const grad = ctx.createRadialGradient(bx, by, br * 0.25, bx, by, br * 1.05);
      grad.addColorStop(0, rgbAlpha(settings.cloudShadow, alpha * 0.32));
      grad.addColorStop(1, rgbAlpha(settings.cloudShadow, 0));
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(bx, by, br, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }
}

// ── Tick clouds ──────────────────────────────────────────────────
function tickClouds(dt) {
  const speedMult = settings.speed / 100;
  const sizeMult = 0.3 + (settings.cloudSize / 100) * 1.4;
  const widthMult = 1 + (settings.cloudWidth / 100) * 3;
  const fadeSpeed = dt / 800; // full fade in ~800ms

  for (let i = clouds.length - 1; i >= 0; i--) {
    const cloud = clouds[i];

    // Fade dying clouds out and remove once invisible
    if (cloud.dying) {
      cloud.fadeAlpha = Math.max(0, cloud.fadeAlpha - fadeSpeed);
      if (cloud.fadeAlpha <= 0) { clouds.splice(i, 1); }
      continue;
    }

    cloud.x += cloud.spd * speedMult * dt * 0.05;

    // Effective half-width in screen space
    const effHalfW = cloud.baseW * sizeMult * widthMult * 0.5;
    // Fade in as cloud enters from left
    const enterFade = Math.min(1, (cloud.x + effHalfW) / (effHalfW * 0.8));
    // Fade out as cloud exits right — start fading once leading edge hits W
    const exitFade = Math.min(1, Math.max(0, (W + effHalfW - cloud.x) / (effHalfW * 0.8)));
    cloud.fadeAlpha = Math.min(enterFade, exitFade);

    // Reset well off the right edge once fully invisible
    if (cloud.x - effHalfW > W + effHalfW) {
      cloud.x = -effHalfW * 2;
      cloud.baseY = cloudBandBaseY();
      cloud.spawnCentre = settings.cloudHeight / 100;
      cloud.fadeAlpha = 0;
    }
  }
}

// ── Main loop ────────────────────────────────────────────────────
let last = 0;
let ts = 0;
function frame(now) {
  const dt = Math.min(now - last, 64); // clamp dt so big gaps don't teleport clouds
  last = now;
  ts = now;

  tickClouds(dt);
  reconcileClouds();

  ctx.clearRect(0, 0, W, H);
  drawSky();
  drawClouds(now);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ── Panel open/close ─────────────────────────────────────────────
let panelOpen = false;
let hintTimer;

function openPanel() {
  panelOpen = true;
  panel.classList.add('open');
  hint.style.opacity = '0';
}
function closePanel() {
  panelOpen = false;
  panel.classList.remove('open');
  hint.style.opacity = '1';
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => { hint.style.opacity = '0'; }, 3000);
}

canvas.addEventListener('dblclick', e => { if (!panelOpen) openPanel(); });
document.getElementById('close-btn').addEventListener('click', closePanel);
document.addEventListener('keydown', e => { if (e.key === 'Escape' && panelOpen) closePanel(); });
panel.addEventListener('dblclick', e => e.stopPropagation());

// ── Bind controls ─────────────────────────────────────────────────
function bindColor(id, key, cb) {
  const el = document.getElementById(id);
  el.addEventListener('input', () => { settings[key] = el.value; if (cb) cb(); });
}
function bindRange(id, key, valId, cb) {
  const el = document.getElementById(id);
  const valEl = valId ? document.getElementById(valId) : null;
  el.addEventListener('input', () => {
    settings[key] = parseInt(el.value);
    if (valEl) valEl.textContent = el.value;
    if (cb) cb();
  });
}

bindColor('skyTop', 'skyTop');
bindColor('skyBottom', 'skyBottom');
bindColor('cloudLight', 'cloudLight');
bindColor('cloudShadow', 'cloudShadow');

bindRange('density', 'density', 'densityVal');
bindRange('cloudSize', 'cloudSize', 'cloudSizeVal');
bindRange('cloudWidth', 'cloudWidth', 'cloudWidthVal');
bindRange('cloudHeight', 'cloudHeight', 'cloudHeightVal');
bindRange('speed', 'speed', 'speedVal');
bindRange('sharpness', 'sharpness', 'sharpnessVal');

hintTimer = setTimeout(() => { hint.style.opacity = '0'; }, 3500);
</script>
</body>
</html>
