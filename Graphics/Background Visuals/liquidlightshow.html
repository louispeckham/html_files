<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Light Show</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #000; 
      width: 100vw; 
      height: 100vh; 
      overflow: hidden; 
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #container {
      width: 100%;
      height: 100%;
      background: #000;
      filter: blur(25px) contrast(50) brightness(0.9); 
    }
    canvas { display: block; }
  </style>
</head>
<body>
<div id="container">
  <canvas id="c"></canvas>
</div>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let W, H, cx, cy, R, maxDim;

  function resize() {
    W = canvas.width  = window.innerWidth + 100;
    H = canvas.height = window.innerHeight + 100;
    cx = W / 2; cy = H / 2;
    R = Math.min(W, H) * 0.5;
    maxDim = Math.max(W, H) * 1.5; 
  }
  resize();
  window.addEventListener('resize', resize);

  const SLICES = 10; 
  const WEDGE  = (Math.PI * 2) / SLICES;
  const CYCLE  = 60; // 60 seconds for a full loop
  
  // To be seamless, the multipliers for Math.PI * 2 must be integers.
  const blobs = Array.from({ length: 12 }, (_, i) => ({
    baseR: R * (0.2 + (i / 12) * 0.5),
    angleOffset: (i / 12) * Math.PI * 2,
    // Integer "rotations" per CYCLE
    rotations: 1 + Math.floor(Math.random() * 3), 
    // Integer "pulses" per CYCLE
    pulses: 2 + Math.floor(Math.random() * 4),
    size: 130 + (i * 10),
    hueOffset: i * 30
  }));

  function drawScene(t) {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, W, H);
    ctx.globalCompositeOperation = 'source-over';

    const loopPhase = t * Math.PI * 2;

    for (let s = 0; s < SLICES; s++) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(s * WEDGE);
      
      // Mirroring from kaleidoscope.html
      if (s % 2 === 1) ctx.scale(1, -1);

      blobs.forEach((b) => {
        // By multiplying the phase by an integer, we guarantee the start and end match.
        const currentAngle = b.angleOffset + (loopPhase * b.rotations);
        const pulseR = b.baseR * Math.sin(loopPhase * b.pulses);
        
        const x = pulseR * Math.cos(currentAngle);
        const y = pulseR * Math.sin(currentAngle);
        
        // Size oscillation must also be an integer multiple of the loop
        const currentSize = b.size + Math.sin(loopPhase * 2) * 30;

        const grad = ctx.createRadialGradient(x, y, 0, x, y, currentSize);
        // Hue rotates exactly 360 degrees (1 full turn) over the CYCLE
        const currentHue = (b.hueOffset + (t * 360)) % 360;
        
        grad.addColorStop(0, `hsla(${currentHue}, 100%, 50%, 0.9)`);
        grad.addColorStop(1, `hsla(${currentHue}, 100%, 50%, 0)`);
        
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, currentSize, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.restore();
    }
  }

  function animate(ms) {
    // Standard normalized time (0.0 to 1.0) based on the CYCLE
    const t = (ms / 1000 % CYCLE) / CYCLE;
    drawScene(t);
    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
</script>
</body>
</html>
