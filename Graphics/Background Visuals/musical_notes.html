<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Musical Notes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #2d8a2d;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .note {
      position: absolute;
      top: 0;
      left: 0;
      color: white;
      user-select: none;
      opacity: 0.85;
      will-change: transform;
      animation: floatAcross 60s linear infinite, bob var(--bob-duration) ease-in-out infinite;
      transform: translateX(-80px) rotate(var(--rot));
      font-size: var(--size);
    }
  </style>
</head>
<body>

<script>
  const noteSymbols = ['♩', '♪', '♫', '♬', '𝅘𝅥𝅮', '♭', '♮','♩', '♪', '♫', '♬', '𝅘𝅥𝅮', '♭', '♮', '𝄞'];
  const totalCycleSecs = 60;
  const noteCount = 18;

  function rand(min, max) {
    return Math.random() * (max - min) + min;
  }

  function createNote(index) {
    const el = document.createElement('div');
    el.classList.add('note');
    el.textContent = noteSymbols[Math.floor(Math.random() * noteSymbols.length)];

    const delay = -(index / noteCount) * totalCycleSecs;
    const topPercent = rand(5, 88);
    const bobAmplitude = rand(18, 55);
    const bobDuration = rand(3.5, 7);
    const fontSize = rand(4, 7);
    const rotation = rand(-18, 18);

    el.style.top = `${topPercent}vh`;
    el.style.setProperty('--bob-amp', `${bobAmplitude}px`);
    el.style.setProperty('--bob-duration', `${bobDuration}s`);
    el.style.setProperty('--rot', `${rotation}deg`);
    el.style.setProperty('--size', `${fontSize}rem`);
    el.style.animationDelay = `${delay}s, ${rand(-bobDuration, 0)}s`;

    document.body.appendChild(el);
  }

  for (let i = 0; i < noteCount; i++) {
    createNote(i);
  }
</script>

<style>
  @keyframes floatAcross {
    from { transform: translateX(-80px) rotate(var(--rot)); }
    to   { transform: translateX(calc(100vw + 80px)) rotate(var(--rot)); }
  }

  @keyframes bob {
    0%, 100% { margin-top: 0; }
    50% { margin-top: var(--bob-amp); }
  }
</style>
</body>
</html>
